<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aid-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1014" />
      <stop offset="55%" stop-color="#121920" />
      <stop offset="100%" stop-color="#1b252d" />
    </linearGradient>
    <linearGradient id="aid-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#86a96b" stop-opacity="0" />
      <stop offset="50%" stop-color="#86a96b" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#86a96b" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="aid-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8ea270" />
      <stop offset="100%" stop-color="#65806f" />
