    <linearGradient id="aid-warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c58a63" />
      <stop offset="100%" stop-color="#b76767" />
    </linearGradient>
    <filter id="aid-soft-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="aid-grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="rgba(242,243,240,0.05)" stroke-width="1" />
    </pattern>
  </defs>

