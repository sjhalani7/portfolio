<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="atr-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1014" />
      <stop offset="55%" stop-color="#121a21" />
      <stop offset="100%" stop-color="#1b252d" />
    </linearGradient>
    <linearGradient id="atr-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8ea270" />
      <stop offset="100%" stop-color="#5f7f8c" />
